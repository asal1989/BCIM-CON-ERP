name: Database backup

# Dumps Railway PostgreSQL to:
#   1. SharePoint (ConstructERP/DB-Backups/) via Microsoft Graph API
#   2. This repo's backups/ folder (committed directly, pruned at 30 days)
#
# Triggers:
#   - Daily at 1:00 AM UTC (auto backup)
#   - Manual via workflow_dispatch from GitHub Actions tab or via the ERP frontend

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install postgresql-client
        # ubuntu-latest's default apt repo only ships pg_dump 16, but the Railway
        # DB runs Postgres 18 — pg_dump refuses to dump a newer major version.
        # Pull the matching client from the official PGDG apt repo instead.
        run: |
          sudo apt-get install -y curl ca-certificates gnupg
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          STAMP=$(date -u +%Y-%m-%d_%H%M)
          pg_dump "$DATABASE_URL" -Fc -f "backup_${STAMP}.dump"
          echo "STAMP=${STAMP}" >> "$GITHUB_ENV"
          DUMP_SIZE=$(du -sh "backup_${STAMP}.dump" | cut -f1)
          echo "Dump size: ${DUMP_SIZE}"
          echo "DUMP_SIZE=${DUMP_SIZE}" >> "$GITHUB_ENV"

      - name: Commit backup to repository
        run: |
          mkdir -p backups
          cp "backup_${STAMP}.dump" "backups/backup_${STAMP}.dump"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "backups/backup_${STAMP}.dump"
          git commit -m "chore(backup): automated DB backup ${STAMP} (${DUMP_SIZE})"
          git push

      - name: Prune backups older than 30 days from repository
        run: |
          CUTOFF=$(date -u -d '30 days ago' +%Y-%m-%d)
          cd backups
          for FILE in backup_*.dump; do
            [ -f "$FILE" ] || continue
            FILE_DATE=$(echo "$FILE" | grep -oP '\d{4}-\d{2}-\d{2}' | head -1 || true)
            if [ -n "$FILE_DATE" ] && [[ "$FILE_DATE" < "$CUTOFF" ]]; then
              echo "Pruning old backup: $FILE"
              git rm "$FILE"
            fi
          done
          cd ..
          if git diff --cached --quiet; then
            echo "No old backups to prune"
          else
            git commit -m "chore(backup): prune backups older than 30 days"
            git push
          fi

      - name: Get Graph API access token
        env:
          TENANT_ID: ${{ secrets.ONEDRIVE_TENANT_ID }}
          CLIENT_ID: ${{ secrets.ONEDRIVE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
        run: |
          TOKEN=$(curl -s -X POST \
            "https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/token" \
            -d "client_id=${CLIENT_ID}" \
            -d "client_secret=${CLIENT_SECRET}" \
            -d "scope=https://graph.microsoft.com/.default" \
            -d "grant_type=client_credentials" | jq -r '.access_token')
          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "Failed to obtain Graph API token"; exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "TOKEN=${TOKEN}" >> "$GITHUB_ENV"

      - name: Upload backup to SharePoint
        env:
          SITE_ID: ${{ secrets.SHAREPOINT_SITE_ID }}
        run: |
          FILE="backup_${STAMP}.dump"
          curl -s -X PUT \
            "https://graph.microsoft.com/v1.0/sites/${SITE_ID}/drive/root:/ConstructERP/DB-Backups/${FILE}:/content" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"${FILE}" -o response.json
          cat response.json
          if jq -e '.id' response.json > /dev/null; then
            echo "Backup uploaded to SharePoint: ${FILE}"
          else
            echo "SharePoint upload failed"; exit 1
          fi

      - name: Prune SharePoint backups older than 30 days
        env:
          SITE_ID: ${{ secrets.SHAREPOINT_SITE_ID }}
        run: |
          CUTOFF=$(date -u -d '30 days ago' +%Y-%m-%d)
          curl -s -H "Authorization: Bearer ${TOKEN}" \
            "https://graph.microsoft.com/v1.0/sites/${SITE_ID}/drive/root:/ConstructERP/DB-Backups:/children?\$select=id,name" \
            | jq -c '.value[]' | while read -r item; do
              NAME=$(echo "$item" | jq -r '.name')
              ITEM_ID=$(echo "$item" | jq -r '.id')
              FILE_DATE=$(echo "$NAME" | grep -oP '(?<=backup_)\d{4}-\d{2}-\d{2}' || true)
              if [ -n "$FILE_DATE" ] && [[ "$FILE_DATE" < "$CUTOFF" ]]; then
                echo "Deleting old SharePoint backup: $NAME"
                curl -s -X DELETE \
                  "https://graph.microsoft.com/v1.0/sites/${SITE_ID}/drive/items/${ITEM_ID}" \
                  -H "Authorization: Bearer ${TOKEN}"
              fi
            done
